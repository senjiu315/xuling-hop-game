  let w = 0, h = 0, dpr = 1, scale = 1;
  let pads = [], cakeBag = [], sparks = [];
  let pressing = false, jumping = false, gameOver = false, shopOpen = false, reviveQuestion = false;
  let pressStart = 0, charge = 0, jumpStart = 0;
  let playerX = 0, playerY = 0, jumpStartX = 0, jumpStartY = 0, jumpTargetX = 0, jumpTargetY = 0;
  let targetIndex = 1, currentPadIndex = 0, score = 0, combo = 0;
  let cameraX = 0, cameraTargetX = 0, shake = 0, flash = '', flashUntil = 0;
  let coins = loadNumber('xulingCoins');
  let best = loadNumber('xulingBest');
  let unlockedCharacters = loadNumber('xulingChars');
  let unlockedSounds = loadNumber('xulingSounds');
  let unlockedCakes = loadNumber('xulingCakes');
  let activeCharacter = loadNumber('xulingChar');
  let activeSound = loadNumber('xulingSound');
  let successful = loadNumber('xulingSuccess');
  let generatedPadCount = 0, coinWindowId = -1, coinSlots = Array(20).fill(false);
  let lastCake = -1, prevCake = -1, previewSoundIndex = -1, previewSoundUntil = 0;
  let reviveAvailable = true;
  let audioCtx = null;
  let audioUnlocked = false;
  let bgmAudio = null;
  let bgmAudioReady = false;
  let bgmStarted = false;
  let bgmMaster = null;
  let bgmTimers = [];
  let lastStartEventAt = 0;
  let lastEndEventAt = 0;

  function loadNumber(key) {
    try {
      const value = window.localStorage && window.localStorage.getItem(key);
      return value == null ? 0 : (+value || 0);
    } catch (err) {
      return 0;
    }
  }

  function storeNumber(key, value) {
    try {
      if (window.localStorage) window.localStorage.setItem(key, String(value));
    } catch (err) {
      // Some mobile file browsers disable localStorage for file:// pages.
    }
  }

  function fit() {
    dpr = Math.min(2.5, window.devicePixelRatio || 1);
    const viewport = currentViewport();
    w = viewport.width;
    h = viewport.height;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    scale = Math.max(0.72, Math.min(w / 420, h / 820));
    reset();
  }

  function currentViewport() {
    const vv = window.visualViewport;
    const width = Math.floor((vv && vv.width) || window.innerWidth || document.documentElement.clientWidth || 393);
    const height = Math.floor((vv && vv.height) || window.innerHeight || document.documentElement.clientHeight || 852);
    return { width: Math.max(300, width), height: Math.max(520, height) };
  }

  function save() {
    storeNumber('xulingCoins', coins);
    storeNumber('xulingBest', best);
    storeNumber('xulingChars', unlockedCharacters);
    storeNumber('xulingSounds', unlockedSounds);
    storeNumber('xulingCakes', unlockedCakes);
    storeNumber('xulingChar', activeCharacter);
    storeNumber('xulingSound', activeSound);
    storeNumber('xulingSuccess', successful);
  }

  function rand(min, max) { return min + Math.random() * (max - min); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function difficulty() { return Math.min(1, score / 35); }
  function bitCount(n) { let c = 0; while (n) { c += n & 1; n >>= 1; } return c; }

  function reset() {
    pads = [];
    cakeBag = [];
    sparks = [];
    score = 0;
    combo = 0;
    currentPadIndex = 0;
    targetIndex = 1;
    cameraX = cameraTargetX = 0;
    charge = 0;
    shake = 0;
    pressing = jumping = gameOver = shopOpen = reviveQuestion = false;
    reviveAvailable = true;
    generatedPadCount = 0;
    coinWindowId = -1;
    coinSlots = Array(20).fill(false);
    lastCake = prevCake = -1;
    const baseY = h * 0.68;
    pads.push({ x: w * 0.28, y: baseY, size: 116 * scale, type: nextCakeType(), coin: false });
    generatedPadCount = 1;
    let x = pads[0].x + nextGap();
    for (let i = 1; i < 9; i++) {
      pads.push(newPad(x, generatedPadCount++));
      x += nextGap();
    }
    playerX = pads[0].x;
    playerY = pads[0].y;
    updateCamera(true);
  }

  function refillCakeBag() {
    cakeBag = [];
    for (let i = 0; i < BASE_CAKE_COUNT; i++) cakeBag.push(i);
    for (let i = 0; i < SHOP_CAKE_COUNT; i++) {
      if (unlockedCakes & (1 << i)) cakeBag.push(BASE_CAKE_COUNT + i);
    }
    for (let i = cakeBag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cakeBag[i], cakeBag[j]] = [cakeBag[j], cakeBag[i]];
    }
  }

  function nextCakeType() {
    if (!cakeBag.length) refillCakeBag();
    let type = cakeBag.pop();
    let guard = 0;
    while ((type === lastCake || type === prevCake) && cakeBag.length && guard < 8) {
      cakeBag.unshift(type);
      type = cakeBag.pop();
      guard++;
    }
    prevCake = lastCake;
    lastCake = type;
    return type;
  }

  function shouldSpawnCoin(index) {
    if (index <= 0) return false;
    const windowId = Math.floor(index / 20);
    if (windowId !== coinWindowId) {
      coinWindowId = windowId;
      coinSlots = Array(20).fill(false);
      let placed = 0;
      while (placed < 5) {
        const slot = Math.floor(Math.random() * 20);
        if (!coinSlots[slot]) { coinSlots[slot] = true; placed++; }
      }
    }
    return coinSlots[index % 20];
  }

  function newPad(x, index) {
    const d = difficulty();
    const size = rand(lerp(96, 58, d) * scale, lerp(138, 88, d) * scale);
    const y = h * lerp(0.63, 0.61, d) + rand(-lerp(0.08, 0.18, d), lerp(0.08, 0.18, d)) * h;
    return { x, y, size, type: nextCakeType(), coin: shouldSpawnCoin(index) };
  }

  function nextGap() {
    const d = difficulty();
    const easyMin = Math.max(150 * scale, w * 0.2);
    const easyMax = Math.min(w * 0.42, 290 * scale);
    const hardMin = Math.max(210 * scale, w * 0.28);
    const hardMax = Math.min(w * 0.58, 390 * scale);
    return rand(lerp(easyMin, hardMin, d), lerp(easyMax, hardMax, d));
  }

  function ensurePads() {
    while (pads.length < targetIndex + 8) {
      const last = pads[pads.length - 1];
      pads.push(newPad(last.x + nextGap(), generatedPadCount++));
    }
    while (pads.length > 2 && currentPadIndex > 1 && pads[1].x < cameraX - w * 0.3) {
      pads.shift();
      currentPadIndex--;
      targetIndex--;
    }
  }

  function updateCamera(snap) {
    if (targetIndex < pads.length) {
      const cur = pads[Math.max(0, currentPadIndex)];
      const next = pads[targetIndex];
      const left = cur.x - cur.size * 0.75;
      const right = next.x + next.size * 0.75;
      const desired = (left + right - w) * 0.5;
      cameraTargetX = Math.max(0, clamp(desired, right - w * 0.86, left - w * 0.14));
    }
    if (snap) cameraX = cameraTargetX;
  }

  function startJump(now) {
    if (jumping || gameOver || targetIndex >= pads.length) return;
    const minJump = Math.max(120 * scale, Math.max(175 * scale, w * 0.23) - 52 * scale);
    const maxGap = Math.min(w * 0.53, 340 * scale);
    const maxJump = Math.min(w * 0.58, maxGap + 74 * scale);
    const dist = minJump + charge * (Math.max(maxJump, minJump + 80 * scale) - minJump);
    jumpStartX = playerX;
    jumpStartY = playerY;
    jumpTargetX = playerX + dist;
    jumpTargetY = pads[targetIndex].y;
    jumpStart = now;
    jumping = true;
    pressing = false;
    charge = 0;
    playTone('jump', activeSound);
    for (let i = 0; i < 16; i++) sparks.push(makeSpark(playerX, playerY, rand(-140, 90) * scale, rand(-180, -40) * scale, PINK));
  }

  function resolveLanding() {
    const target = pads[targetIndex];
    const miss = Math.abs(playerX - target.x);
    const d = difficulty();
    const perfect = target.size * lerp(0.2, 0.13, d);
    const safe = target.size * lerp(0.52, 0.36, d);
    if (miss <= safe) {
      currentPadIndex = targetIndex++;
      successful++;
      combo = miss <= perfect ? combo + 1 : 0;
      const gain = combo >= 2 ? 2 + Math.min(combo, 6) : 1;
      score += gain;
      best = Math.max(best, score);
      let collected = false;
      if (target.coin) {
        coins++;
        collected = true;
        target.coin = false;
      }
      if (successful % 50 === 0) {
        grantRandomItem();
      } else {
        flash = (miss <= perfect ? '完美甜跳 +' : '+') + gain + (collected ? '  金币 +1' : '');
        flashUntil = performance.now() + 900;
      }
      playTone(miss <= perfect ? 'perfect' : 'land', activeSound);
      for (let i = 0; i < (miss <= perfect ? 22 : 10); i++) {
        sparks.push(makeSpark(target.x, target.y, rand(-170, 170) * scale, rand(-250, -60) * scale, miss <= perfect ? LILAC : GOLD));
      }
      ensurePads();
      playerX = target.x;
      playerY = target.y;
      updateCamera(false);
      save();
    } else {
      flash = '许澪要跳了喵';
      flashUntil = performance.now() + 1500;
      playTone('fail', activeSound);
      if (reviveAvailable) {
        reviveQuestion = true;
        jumping = pressing = false;
      } else {
        gameOver = true;
      }
    }
  }

  function grantRandomItem() {
    const locked = [];
    for (let i = 0; i < SHOP_CHARACTER_COUNT; i++) if (!(unlockedCharacters & (1 << i))) locked.push(i);
    for (let i = 0; i < SHOP_SOUND_COUNT; i++) if (!(unlockedSounds & (1 << i))) locked.push(100 + i);
    for (let i = 0; i < SHOP_CAKE_COUNT; i++) if (!(unlockedCakes & (1 << i))) locked.push(200 + i);
    if (!locked.length) {
      coins += PRICE;
      flash = '商城已全解锁，金币 +10';
    } else {
      unlockItem(locked[Math.floor(Math.random() * locked.length)]);
      flash = '随机解锁成功';
    }

  function createBgmWav() {
    const sampleRate = 22050;
    const seconds = 7.2;
    const total = Math.floor(sampleRate * seconds);
    const samples = new Float32Array(total);
    const melody = [523.25, 659.25, 783.99, 659.25, 587.33, 739.99, 880.00, 739.99,
      659.25, 783.99, 987.77, 880.00, 783.99, 659.25, 587.33, 523.25];
    const bass = [261.63, 329.63, 392.00, 329.63, 293.66, 369.99, 440.00, 369.99];
    const chords = [[261.63, 329.63, 392.00], [293.66, 369.99, 440.00], [329.63, 392.00, 493.88], [261.63, 349.23, 440.00]];
    for (let i = 0; i < melody.length; i++) addSynthNote(samples, sampleRate, melody[i], i * 0.225, 0.18, 0.26, i % 4 ? 0 : 1);
    for (let i = 0; i < bass.length; i++) addSynthNote(samples, sampleRate, bass[i], i * 0.45, 0.34, 0.15, 0);
    for (let i = 0; i < 8; i++) addSynthNote(samples, sampleRate, 1046.5 + (i % 2) * 261.6, i * 0.45 + 0.12, 0.08, 0.12, 1);
    for (let i = 0; i < chords.length; i++) {

  function addSynthNote(samples, sampleRate, freq, startSec, duration, volume, type) {
    const start = Math.max(0, Math.floor(startSec * sampleRate));
    const end = Math.min(samples.length, Math.floor((startSec + duration) * sampleRate));
    const attack = Math.max(1, Math.floor(0.018 * sampleRate));
    const release = Math.max(1, Math.floor(0.055 * sampleRate));
    for (let i = start; i < end; i++) {
      const local = i - start;
      const remain = end - i;
      const phase = (i / sampleRate) * freq;
      const wave = type ? (2 * Math.abs(2 * (phase - Math.floor(phase + 0.5))) - 1) : Math.sin(phase * Math.PI * 2);
      const env = Math.min(1, local / attack, remain / release);
      samples[i] += wave * volume * Math.max(0, env);

  function encodeWav(samples, sampleRate) {
    const bytes = new Uint8Array(44 + samples.length * 2);
    const view = new DataView(bytes.buffer);
    writeStr(view, 0, 'RIFF');
    view.setUint32(4, 36 + samples.length * 2, true);
    writeStr(view, 8, 'WAVE');
    writeStr(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeStr(view, 36, 'data');
    view.setUint32(40, samples.length * 2, true);

    for (let i = 0; i < samples.length; i++, offset += 2) {

  }

    const melody = [523.25, 659.25, 783.99, 659.25, 587.33, 739.99, 880.00, 739.99,
      659.25, 783.99, 987.77, 880.00, 783.99, 659.25, 587.33, 523.25];
    const bass = [261.63, 329.63, 392.00, 329.63, 293.66, 369.99, 440.00, 369.99];
    const chords = [[261.63, 329.63, 392.00], [293.66, 369.99, 440.00], [329.63, 392.00, 493.88], [261.63, 349.23, 440.00]];
    for (let i = 0; i < melody.length; i++) {
      playBgmNote(melody[i], start + i * 0.225, 0.18, 0.13, i % 4 === 0 ? 'triangle' : 'sine');

    for (let i = 0; i < bass.length; i++) {
      playBgmNote(bass[i], start + i * 0.45, 0.34, 0.07, 'sine');

    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    const base = [720, 860, 640, 980, 780, 900][set] || 760;
    const conf = {
      jump: [base, base + 420, 0.22, 0.055],
      land: [base * 0.62, base * 0.48, 0.18, 0.05],
      perfect: [base * 1.15, base * 1.9, 0.42, 0.07],
      fail: [base * 0.7, base * 0.32, 0.36, 0.055]

    const o2 = ac.createOscillator();
    o1.type = set % 2 ? 'triangle' : 'sine';
    o2.type = set % 3 ? 'sine' : 'square';
    o1.frequency.setValueAtTime(conf[0], t);
    o1.frequency.exponentialRampToValueAtTime(Math.max(80, conf[1]), t + conf[2]);
    o2.frequency.setValueAtTime(conf[0] * 1.7, t);
    o2.frequency.exponentialRampToValueAtTime(Math.max(120, conf[1] * 1.35), t + conf[2]);

    gain.gain.exponentialRampToValueAtTime(conf[3], t + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + conf[2]);

    else if (t === 7) { ellipse(cx, cy, s*.28, s*.22, '#e2a767'); ellipse(cx, cy, s*.24, s*.18, '#ff8fc5'); ellipse(cx, cy, s*.1, s*.08, '#fffcf5'); }
    else if (t === 8) { roundRect(cx-s*.29, cy-s*.16, s*.58, s*.34, 8*scale); ctx.fillStyle='#704439'; ctx.fill(); strawberry(cx+s*.15, cy-s*.25, s*.07); }
    else if (t === 9) { roundRect(cx-s*.28, cy-s*.17, s*.56, s*.35, 10*scale); ctx.fillStyle='#ffe8f4'; ctx.fill(); bow(cx, cy-s*.2, s*.48); }
    else if (t === 10) { roundRect(cx-s*.28, cy-s*.18, s*.56, s*.36, 10*scale); ctx.fillStyle='#ffe0ef'; ctx.fill(); crown(cx, cy-s*.32, s*.18); }
    else if (t === 11) { ellipse(cx, cy, s*.3, s*.2, '#e6d4ff'); circle(cx+s*.03, cy-s*.22, s*.12, '#fff6c2'); star(cx-s*.18, cy-s*.18, s*.055, '#ffe86d'); }
    else if (t === 12) { roundRect(cx-s*.25, cy-s*.22, s*.5, s*.42, 8*scale); ctx.fillStyle='#eeb15f'; ctx.fill(); roundRect(cx-s*.18, cy-s*.16, s*.36, s*.29, 7*scale); ctx.fillStyle='#ffe8a6'; ctx.fill(); }
    else if (t === 13) { roundRect(cx-s*.25, cy-s*.22, s*.5, s*.42, 16*scale); ctx.fillStyle='rgba(130,218,255,.82)'; ctx.fill(); berry(cx+s*.16, cy-s*.17, s*.045); }
    else if (t === 14) { ellipse(cx, cy, s*.3, s*.2, '#ffecf5'); circle(cx, cy, s*.09, '#ff8bc2'); circle(cx-s*.12, cy-s*.1, s*.055, '#ff8bc2'); circle(cx+s*.12, cy-s*.1, s*.055, '#ff8bc2'); }
    else if (t === 15) { roundRect(cx-s*.28, cy-s*.17, s*.56, s*.35, 8*scale); ctx.fillStyle='#bade95'; ctx.fill(); circle(cx-s*.08, cy-s*.22, s*.055, '#fff'); circle(cx+s*.08, cy-s*.22, s*.055, '#fff'); }
    else if (t === 16) { ellipse(cx, cy, s*.31, s*.19, '#e3a95f'); ellipse(cx, cy, s*.24, s*.14, '#fff1d2'); ellipse(cx+s*.04, cy-s*.1, s*.18, s*.09, '#ffa291'); }
    else if (t === 17) { ctx.fillStyle='rgba(201,184,255,.82)'; ctx.beginPath(); ctx.moveTo(cx,cy-s*.28); ctx.lineTo(cx+s*.24,cy-s*.02); ctx.lineTo(cx+s*.13,cy+s*.22); ctx.lineTo(cx-s*.13,cy+s*.22); ctx.lineTo(cx-s*.24,cy-s*.02); ctx.closePath(); ctx.fill(); }
    else if (t === 18) { ellipse(cx, cy+s*.12, s*.24, s*.1, '#fff9f0'); ellipse(cx, cy, s*.19, s*.09, '#fff9f0'); ellipse(cx, cy-s*.1, s*.13, s*.08, '#fff9f0'); strawberry(cx, cy-s*.28, s*.07); }
    else { heart(cx, cy, s*.26, '#e7a55f'); }
  }

  function drawAgent(now) {
    const bob = jumping ? 0 : Math.sin(now / 180) * 2.2 * scale;
    const accent = ['#ff7bbb','#ff6aae','#c296ff','#ffbe5c','#78d3ff','#ff7480'][activeCharacter] || '#ff7bbb';
    ctx.save();
    ctx.translate(playerX, playerY + bob);
    ctx.scale((pressing ? 1 + charge * .16 : 1) * .52, (pressing ? 1 - charge * .18 : 1) * .52);
    ellipse(0, 52*scale, 54*scale, 9*scale, 'rgba(189,58,116,.3)');
    ctx.fillStyle = `rgba(255,123,187,.24)`;
    ctx.beginPath(); ctx.ellipse(0, -86*scale, 82*scale, 112*scale, 0, 0, Math.PI*2); ctx.fill();
    if (img.complete) {
      ctx.drawImage(img, -91*scale, -158*scale, 182*scale, 222*scale);
    }
    if (activeCharacter === 2 || activeCharacter === 5) star(-76*scale, -132*scale, 8*scale, '#ffe77c');
    if (activeCharacter === 3 || activeCharacter === 4) heart(76*scale, -92*scale, 7*scale, accent);
    ctx.restore();
  }

  function drawChargeGuide() {
    if (!pressing || jumping || gameOver || targetIndex >= pads.length) return;
    const target = pads[targetIndex];
    const minJump = Math.max(120 * scale, Math.max(175 * scale, w * 0.23) - 52 * scale);
    const maxJump = Math.max(minJump + 80 * scale, Math.min(w * 0.58, Math.min(w * 0.53, 340 * scale) + 74 * scale));
    const previewX = playerX + minJump + charge * (maxJump - minJump);
    ctx.strokeStyle = 'rgba(255,101,174,.7)'; ctx.lineWidth = 3*scale;
    ctx.beginPath(); ctx.moveTo(playerX, playerY - 24*scale);
    ctx.quadraticCurveTo((playerX + previewX)*.5, Math.min(playerY, target.y) - 180*scale, previewX, target.y);
    ctx.stroke();
    heart(previewX, target.y, 8*scale, 'rgba(255,101,174,.9)');
  }

  function drawSpark(s) {
    const a = Math.max(0, 1 - s.age / s.life);
    ctx.globalAlpha = a;
    star(s.x, s.y, s.r * (1 - s.age / s.life * .4), s.color);
    ctx.globalAlpha = 1;
  }

  function drawHud(now) {
    ctx.textAlign = 'left'; ctx.fillStyle = COCOA; ctx.font = `700 ${18*scale}px sans-serif`;
    ctx.fillText('许澪跳一跳', 22*scale, 28*scale);
    ctx.fillStyle = '#b4752c'; ctx.font = `700 ${16*scale}px sans-serif`;
    ctx.fillText('金币 ' + coins, 22*scale, 52*scale); coin(96*scale, 46*scale, 7*scale, 1);
    const sb = shopRect();
    ctx.fillStyle = 'rgba(255,255,255,.84)'; roundRect(sb.x, sb.y, sb.w, sb.h, 13*scale); ctx.fill();
    ctx.strokeStyle = PINK; ctx.lineWidth = 1.5*scale; ctx.stroke();
    ctx.textAlign = 'center'; ctx.fillStyle = HOT; ctx.font = `700 ${15*scale}px sans-serif`; ctx.fillText('商城', sb.x+sb.w/2, sb.y+23*scale);
    ctx.font = `800 ${60*scale}px sans-serif`; ctx.fillText(score, w*.5, 78*scale);
    ctx.font = `700 ${16*scale}px sans-serif`; ctx.fillStyle = 'rgba(118,71,82,.74)'; ctx.fillText('BEST ' + best, w*.5, 104*scale);
    ctx.font = `700 ${14*scale}px sans-serif`; ctx.fillStyle = 'rgba(245,75,150,.7)';
    ctx.fillText(score < 10 ? '甜甜练习' : score < 25 ? '渐入佳境' : '精准挑战', w*.5, 126*scale);
    if (combo >= 2) { ctx.fillStyle = LILAC; ctx.fillText('甜甜连跳 x' + combo, w*.5, 150*scale); }
    if (pressing && !gameOver) {
      const bw = w * .62, x = (w - bw) * .5, y = h - 76*scale;
      ctx.fillStyle = 'rgba(255,255,255,.6)'; roundRect(x, y, bw, 10*scale, 6*scale); ctx.fill();
      ctx.fillStyle = PINK; roundRect(x, y, bw*charge, 10*scale, 6*scale); ctx.fill();
      heart(x + bw*charge, y + 5*scale, 6*scale, '#ff5ba4');
    }
    if (flashUntil > now) {
      ctx.font = `800 ${24*scale}px sans-serif`; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,105,174,.95)';
      ctx.fillText(flash, w*.5, h*.22);
    }
    if (!pressing && !jumping && score === 0 && !gameOver && !shopOpen && !reviveQuestion) {
      ctx.font = `700 ${19*scale}px sans-serif`; ctx.fillStyle = COCOA;
      ctx.fillText('按住蓄力  松手开跳', w*.5, h - 84*scale);
    }
  }

  function drawShop(now) {
    ctx.fillStyle = 'rgba(255,236,247,.92)'; ctx.fillRect(0,0,w,h);
    const panel = {x:22*scale,y:88*scale,w:w-44*scale,h:h-158*scale};
    ctx.fillStyle = '#fff'; roundRect(panel.x,panel.y,panel.w,panel.h,24*scale); ctx.fill();
    ctx.strokeStyle = PINK; ctx.lineWidth = 2*scale; ctx.stroke();
    ctx.textAlign = 'center'; ctx.fillStyle = HOT; ctx.font = `800 ${24*scale}px sans-serif`; ctx.fillText('许澪甜品商城', w*.5, 126*scale);
    ctx.fillStyle = COCOA; ctx.font = `700 ${14*scale}px sans-serif`; ctx.fillText('每件 10 金币  音效先试听，再点购买', w*.5, 150*scale);
    shopSection(0, '角色', 170*scale, SHOP_CHARACTER_COUNT, now);
    shopSection(1, '音效', 314*scale, SHOP_SOUND_COUNT, now);
    shopSection(2, '新蛋糕', 458*scale, SHOP_CAKE_COUNT, now);
    const c = closeRect(); ctx.fillStyle = HOT; roundRect(c.x,c.y,c.w,c.h,16*scale); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = `800 ${18*scale}px sans-serif`; ctx.fillText('关闭', c.x+c.w/2, c.y+25*scale);
  }

  function shopSection(cat, title, top, count, now) {
    ctx.textAlign = 'left'; ctx.fillStyle = COCOA; ctx.font = `800 ${17*scale}px sans-serif`; ctx.fillText(title, 42*scale, top);
    for (let i=0;i<count;i++) {
      const r = cellRect(cat,i), unlocked = isUnlocked(cat,i);
      const active = (cat===0 && activeCharacter===i+1) || (cat===1 && activeSound===i+1);
      ctx.fillStyle = active ? '#ffe7f2' : '#fff8fc'; roundRect(r.x,r.y,r.w,r.h,12*scale); ctx.fill();
      ctx.strokeStyle = unlocked ? LILAC : PINK; ctx.lineWidth = 1.5*scale; ctx.stroke();
      if (cat===0) miniChar(r.x+r.w/2, r.y+r.h/2-4*scale, i+1);
      else if (cat===1) { star(r.x+r.w/2, r.y+r.h/2-6*scale, 13*scale, soundColor(i+1)); ctx.textAlign='center'; ctx.fillStyle=COCOA; ctx.font=`700 ${12*scale}px sans-serif`; ctx.fillText('S'+(i+1), r.x+r.w/2, r.y+r.h-8*scale); }
      else drawCake(BASE_CAKE_COUNT+i, r.x+r.w/2, r.y+r.h/2+3*scale, 48*scale, .8);
      if (!unlocked) {
        ctx.textAlign='right'; ctx.fillStyle='#b4752c'; ctx.font=`700 ${11*scale}px sans-serif`; ctx.fillText('10', r.x+r.w-7*scale, r.y+14*scale);
        if (cat===1) { ctx.textAlign='center'; ctx.fillStyle = previewSoundIndex===i && now<previewSoundUntil ? HOT : '#a56d80'; ctx.font=`700 ${9*scale}px sans-serif`; ctx.fillText(previewSoundIndex===i && now<previewSoundUntil ? '再点买' : '试听', r.x+r.w/2, r.y+r.h-7*scale); }
      }
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(255,236,247,.65)'; ctx.fillRect(0,0,w,h);
    drawCloud(w*.5, h*.39, 132*scale, 'rgba(255,255,255,.9)');
    ctx.textAlign = 'center'; ctx.fillStyle = HOT; ctx.font = `800 ${33*scale}px sans-serif`; ctx.fillText('许澪要跳了喵', w*.5, h*.42);
    ctx.fillStyle = COCOA; ctx.font = `700 ${19*scale}px sans-serif`; ctx.fillText(`得分 ${score}   最佳 ${best}`, w*.5, h*.48);
    ctx.fillStyle = '#fff'; roundRect(w*.22, h*.55, w*.56, h*.065, 18*scale); ctx.fill(); ctx.strokeStyle = PINK; ctx.lineWidth = 2*scale; ctx.stroke();
    ctx.fillStyle = HOT; ctx.fillText('再跳一次', w*.5, h*.592);
  }

  function drawRevive() {
    ctx.fillStyle = 'rgba(255,236,247,.75)'; ctx.fillRect(0,0,w,h);
    roundRect(28*scale, h*.31, w-56*scale, h*.31, 24*scale); ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = PINK; ctx.lineWidth = 2*scale; ctx.stroke();
    ctx.textAlign = 'center'; ctx.fillStyle = HOT; ctx.font = `800 ${25*scale}px sans-serif`; ctx.fillText('复活问答', w*.5, h*.37);
    ctx.fillStyle = COCOA; ctx.font = `700 ${20*scale}px sans-serif`; ctx.fillText('森玖是不是世界上最帅的人', w*.5, h*.43);
    answerButton(yesRect(), '是', true); answerButton(noRect(), '否', false);
  }

  function answerButton(r, text, yes) {
    ctx.fillStyle = yes ? HOT : '#fff'; roundRect(r.x,r.y,r.w,r.h,18*scale); ctx.fill(); ctx.strokeStyle = yes ? HOT : PINK; ctx.lineWidth = 2*scale; ctx.stroke();
    ctx.fillStyle = yes ? '#fff' : HOT; ctx.font = `800 ${22*scale}px sans-serif`; ctx.textAlign='center'; ctx.fillText(text, r.x+r.w/2, r.y+r.h/2+7*scale);
  }

  function shopRect(){ return {x:w-92*scale,y:18*scale,w:74*scale,h:36*scale}; }
  function closeRect(){ return {x:w*.34,y:h-56*scale,w:w*.32,h:38*scale}; }
  function cellRect(cat,i){ return {x:40*scale+(i%5)*68*scale,y:(190+cat*144+Math.floor(i/5)*62)*scale,w:56*scale,h:52*scale}; }
  function yesRect(){ return {x:w*.19,y:h*.51,w:w*.27,h:h*.06}; }
  function noRect(){ return {x:w*.54,y:h*.51,w:w*.27,h:h*.06}; }
  function hit(r,x,y){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
  function soundColor(id){ return ['#ff7eb8','#cdaaff','#ffcd68','#78d3ff','#ff7480','#a9e084'][id] || PINK; }

  function miniChar(cx, cy, style) {
    const oldX=playerX, oldY=playerY, old=activeCharacter;
    playerX=0; playerY=0; activeCharacter=style;
    ctx.save(); ctx.translate(cx, cy+18*scale); ctx.scale(.5,.5); drawAgent(0); ctx.restore();
    playerX=oldX; playerY=oldY; activeCharacter=old;
  }

  function pointerDown(e) {
    const now = performance.now();
    if (now - lastStartEventAt < 90) return;
    lastStartEventAt = now;
    if (e.cancelable) e.preventDefault();
    const p = point(e);
    unlockAudio();
    if (shopOpen) { handleShop(p.x,p.y); return; }
    if (reviveQuestion) { handleRevive(p.x,p.y); return; }
    if (hit(shopRect(), p.x, p.y)) { shopOpen = true; pressing = false; return; }
    if (gameOver) { reset(); return; }
    if (!jumping) { pressing = true; pressStart = performance.now(); charge = 0; }
  }

  function pointerUp(e) {
    const now = performance.now();
    if (now - lastEndEventAt < 90) return;
    lastEndEventAt = now;
    if (e.cancelable) e.preventDefault();
    if (pressing && !jumping && !gameOver && !shopOpen && !reviveQuestion) {
      charge = Math.min(1, (performance.now() - pressStart) / MAX_CHARGE);
      startJump(performance.now());
    }
  }

  function handleShop(x,y) {
    if (hit(closeRect(),x,y)) { shopOpen=false; return; }
    for (let cat=0;cat<3;cat++) {
      const count = cat===2 ? SHOP_CAKE_COUNT : SHOP_CHARACTER_COUNT;
      for (let i=0;i<count;i++) if (hit(cellRect(cat,i),x,y)) return buyOrEquip(cat,i);
    }
  }

  function handleRevive(x,y) {
    if (hit(yesRect(),x,y)) {
      reviveAvailable = false; reviveQuestion = false; gameOver = false; pressing = jumping = false;
      const cur = pads[Math.max(0,currentPadIndex)]; playerX = cur.x; playerY = cur.y; updateCamera(false);
      flash = '复活成功'; flashUntil = performance.now() + 1000;
    } else if (hit(noRect(),x,y)) {
      reviveAvailable = false; reviveQuestion = false; gameOver = true; flash = '许澪要跳了喵'; flashUntil = performance.now()+1200;
    }
  }

  function point(e) {
    const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    const r = canvas.getBoundingClientRect();
    return { x: (t ? t.clientX : 0) - r.left, y: (t ? t.clientY : 0) - r.top };
  }

  function circle(x,y,r,color){ if(color) ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
  function ellipse(x,y,rx,ry,color){ if(color) ctx.fillStyle=color; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill(); }
  function line(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
  function heart(cx,cy,s,color){ ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(cx,cy+s*.7); ctx.bezierCurveTo(cx-s*1.2,cy,cx-s*.7,cy-s*.85,cx,cy-s*.25); ctx.bezierCurveTo(cx+s*.7,cy-s*.85,cx+s*1.2,cy,cx,cy+s*.7); ctx.fill(); }
  function star(cx,cy,s,color){ ctx.fillStyle=color; ctx.beginPath(); for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, r=i%2?s*.45:s, x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.closePath(); ctx.fill(); }
  function strawberry(cx,cy,s){ ctx.fillStyle='#ff5482'; ctx.beginPath(); ctx.moveTo(cx,cy+s); ctx.bezierCurveTo(cx-s,cy+s*.15,cx-s*.45,cy-s*.8,cx,cy-s*.25); ctx.bezierCurveTo(cx+s*.45,cy-s*.8,cx+s,cy+s*.15,cx,cy+s); ctx.fill(); star(cx,cy-s*.25,s*.35,'#71c26e'); }
  function berry(cx,cy,r){ circle(cx,cy,r,'#775de0'); circle(cx-r*.28,cy-r*.25,r*.26,'rgba(255,255,255,.65)'); }
  function bow(cx,cy,s,color=PINK){ ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.bezierCurveTo(cx-s*.36,cy-s*.28,cx-s*.46,cy+s*.18,cx,cy+s*.08); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.bezierCurveTo(cx+s*.36,cy-s*.28,cx+s*.46,cy+s*.18,cx,cy+s*.08); ctx.fill(); circle(cx,cy+s*.03,s*.07,'#fffcf5'); }
  function crown(cx,cy,s){ ctx.fillStyle='#ffd75b'; ctx.beginPath(); ctx.moveTo(cx-s,cy+s*.5); ctx.lineTo(cx-s*.55,cy-s*.45); ctx.lineTo(cx,cy+s*.12); ctx.lineTo(cx+s*.55,cy-s*.45); ctx.lineTo(cx+s,cy+s*.5); ctx.closePath(); ctx.fill(); }
  function coin(cx,cy,r,pulse){ circle(cx,cy,r*(1+pulse*.08),'#ffd64f'); circle(cx-r*.22,cy-r*.2,r*.42,'#fff6a4'); ctx.strokeStyle='#d7912a'; ctx.lineWidth=2*scale; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(.033, Math.max(.001, (now-last)/1000)); last = now;
    update(now, dt);
    draw(now);
  }

  window.addEventListener('resize', fit);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fit);
    window.visualViewport.addEventListener('scroll', fit);
  }
  window.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('pointerdown', pointerDown, {passive:false});
  window.addEventListener('pointerup', pointerUp, {passive:false});
  window.addEventListener('pointercancel', pointerUp, {passive:false});
  window.addEventListener('touchstart', pointerDown, {passive:false});
  window.addEventListener('touchend', pointerUp, {passive:false});
  window.addEventListener('touchcancel', pointerUp, {passive:false});
  window.addEventListener('mousedown', pointerDown);
  window.addEventListener('mouseup', pointerUp);
  fit();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
